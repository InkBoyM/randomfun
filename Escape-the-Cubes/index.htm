<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape the Cubes!</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            cursor: none;
        }
        canvas {
            background-color: #f0f0f0;
            display: block;
            margin: auto;
        }
        .menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        .menu button {
            margin: 10px;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
        }
        .panel {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="menu" id="mainMenu">
        <h1>Escape the Cubes!</h1>
        <button onclick="startGame('easy')">Easy</button>
        <button onclick="startGame('normal')">Normal</button>
        <button onclick="startGame('hard')">Hard</button>
        <button onclick="startGame('insane')">Insane</button>
        <br>
        <button onclick="showHowToPlay()" style="background-color: #e0e0e0;">How to Play</button>
    </div>

    <div class="menu" id="howToPlayMenu" style="display: none;">
        <div class="panel">
            <h2>How to Play</h2>
            <p><strong>Goal:</strong> Survive as long as possible!</p>
            <p><strong>Controls:</strong> Move your mouse to guide the blue dot.</p>
            <p><strong>Danger:</strong> Avoid the red cubes—they will chase you.</p>
            <button onclick="hideHowToPlay()">Back to Menu</button>
        </div>
    </div>

    <div class="menu" id="gameOverMenu" style="display: none;">
        <div class="panel">
            <h2>Game Over!</h2>
            <p><strong>Score:</strong> <span id="finalScore">0</span></p>
            <p><strong>High Score:</strong> <span id="highScoreDisplay">0</span></p>
            <button onclick="backToMenu()">Play Again</button>
        </div>
    </div>

    <canvas id="gameCanvas" style="display: none;"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 10
        };

        let blocks = [];
        let isGameOver = false;
        let score = 0;
        let highScore = localStorage.getItem('escapeCubesHighScore') || 0;
        let difficulty = '';
        let spawnInterval;

        function createBlock() {
            let bx, by;
            let safeDistance = 150;
            
            do {
                bx = Math.random() * canvas.width;
                by = Math.random() * canvas.height;
            } while (Math.hypot(bx - player.x, by - player.y) < safeDistance);

            const block = {
                x: bx,
                y: by,
                width: 30,
                height: 30,
                speed: difficulty === 'easy' ? 2 : difficulty === 'normal' ? 3 : difficulty === 'hard' ? 4 : 5
            };
            blocks.push(block);
        }

        function drawPlayer() {
            ctx.fillStyle = 'blue';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawBlocks() {
            ctx.fillStyle = 'red';
            blocks.forEach(block => {
                ctx.fillRect(block.x, block.y, block.width, block.height);
            });
        }

        function drawScore() {
            ctx.fillStyle = 'black';
            ctx.font = '24px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(`Score: ${score}`, 20, 40);
            ctx.fillText(`High Score: ${highScore}`, 20, 70);
        }

        function moveBlocks() {
            blocks.forEach(block => {
                const dx = player.x - block.x;
                const dy = player.y - block.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const speedFactor = block.speed / distance;
                block.x += dx * speedFactor;
                block.y += dy * speedFactor;
            });
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function update() {
            if (!isGameOver) {
                moveBlocks();
                checkCollisions();
                clearCanvas();
                drawPlayer();
                drawBlocks();
                drawScore();
                score++;
                requestAnimationFrame(update);
            }
        }

        function onMouseMove(event) {
            player.x = event.clientX;
            player.y = event.clientY;
        }

        function checkCollisions() {
            blocks.forEach(block => {
                const dx = player.x - (block.x + block.width / 2);
                const dy = player.y - (block.y + block.height / 2);
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < player.radius + Math.sqrt(2) * block.width / 2) {
                    isGameOver = true;
                    endGame();
                }
            });
        }

        function showHowToPlay() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('howToPlayMenu').style.display = 'block';
        }

        function hideHowToPlay() {
            document.getElementById('howToPlayMenu').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'block';
        }

        function backToMenu() {
            document.getElementById('gameOverMenu').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'block';
        }

        function startGame(selectedDifficulty) {
            difficulty = selectedDifficulty;
            blocks = [];
            isGameOver = false;
            score = 0;
            
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;

            document.getElementById('gameCanvas').style.display = 'block';
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('gameOverMenu').style.display = 'none';
            
            document.addEventListener('mousemove', onMouseMove);
            spawnInterval = setInterval(createBlock, 1000);
            update();
        }

        function endGame() {
            clearInterval(spawnInterval);
            document.removeEventListener('mousemove', onMouseMove);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('escapeCubesHighScore', highScore);
            }

            document.getElementById('finalScore').innerText = score;
            document.getElementById('highScoreDisplay').innerText = highScore;

            document.getElementById('gameCanvas').style.display = 'none';
            document.getElementById('gameOverMenu').style.display = 'block';
            
            document.body.style.cursor = 'default';
        }
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
